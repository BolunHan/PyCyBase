name: Documentation

on:
    push:
        tags:
            - 'v*.*.*'  # Trigger on version tags
    pull_request:
        branches: [ main, master ]
    workflow_dispatch:  # Allow manual triggering

permissions:
    contents: write

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0  # Fetch all history for proper version detection

            -   name: Set up Python
                uses: actions/setup-python@v5
                with:
                    python-version: '3.13'

            -   name: Install build dependencies
                run: |
                    python -m pip install --upgrade pip
                    pip install cython setuptools wheel

            -   name: Build Cython extensions
                run: |
                    python setup.py build_ext --inplace --verbose --force

            -   name: Install package
                run: |
                    pip install -U . --no-build-isolation

            -   name: Install documentation dependencies
                run: |
                    pip install sphinx furo sphinx-autodoc-typehints

            -   name: Build documentation
                run: |
                    cd docs
                    sphinx-build -M html . _build

            -   name: Deploy to GitHub Pages
                if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
                uses: peaceiris/actions-gh-pages@v3
                with:
                    github_token: ${{ secrets.GITHUB_TOKEN }}
                    publish_dir: ./docs/_build/html
                    cname: false
                    commit_message: 'Deploy documentation for ${{ github.ref_name }}'
